<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — BioBoost AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: var(--bg-main); font-family: var(--font-main); }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 10; position: relative;}
        .login-box h2 { font-family: var(--font-display); color: white; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); background: var(--bg-dark); color: white; font-family: var(--font-main); }
        .login-box input:focus { outline: none; border-color: var(--accent-purple); }
        .login-box .btn-primary { background: var(--gradient-main); color: #0a0a0f; border: none; padding: 14px; border-radius: var(--radius-md); cursor: pointer; font-weight: 700; width: 100%; font-size: 1rem; transition: 0.2s;}
        .login-box .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .login-box .error-msg { color: #ef4444; margin-top: 15px; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="login-box">
        <div class="logo" style="justify-content: center; margin-bottom: 20px;">
            <span class="logo-text">BioBoost <span class="logo-ai">Admin</span></span>
        </div>
        <form id="standaloneLoginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-primary" id="loginBtn">Access Dashboard</button>
            <p class="error-msg" id="loginError">Invalid credentials. Please try again.</p>
        </form>
    </div>

    <script>
        document.getElementById('standaloneLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            errorEl.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    // Store JWT in localStorage — used by admin panel for all requests
                    localStorage.setItem('bioboost_admin_token', data.token);
                    window.location.href = 'blog-admin.html';
                } else {
                    errorEl.textContent = data.error || 'Invalid credentials. Please try again.';
                    errorEl.style.display = 'block';
                    btn.textContent = 'Access Dashboard';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error('Login Error:', err);
                errorEl.textContent = 'Could not connect to the server. Please try again.';
                errorEl.style.display = 'block';
                btn.textContent = 'Access Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
